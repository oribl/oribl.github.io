<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400&family=Merriweather:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <script src="./theme.js"></script>
  <style>
    :root {
      --bg: #fafafa;
      --text: #1a1a1a;
      --body: #555;
      --sub: #888;
      --muted: #bbb;
      --wip: #ddd;
      --wip2: #e0e0e0;
      --border: #ebebeb;
      --hairline: #f5f5f5;
      --accent: #f97316;
      --accent-soft: rgba(249,115,22,0.3);
      --accent-cursor: rgba(249,115,22,0.65);
      --cursor: rgba(0,0,0,0.48);
    }
    [data-theme="dark"] {
      --bg: #141312;
      --text: #ececea;
      --body: #a6a39e;
      --sub: #97948f;
      --muted: #6e6b67;
      --wip: #46443f;
      --wip2: #39372f;
      --border: #2b2926;
      --hairline: #1e1c1a;
      --accent: #4ade80;
      --accent-soft: rgba(74,222,128,0.38);
      --accent-cursor: rgba(74,222,128,0.7);
      --cursor: rgba(255,255,255,0.55);
    }
    body { transition: background-color 0.3s ease; }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); cursor: none; }
    a { cursor: none; }
    button { cursor: none; }
    @keyframes blink { 0%, 49.9% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @media (max-width: 760px) {
      #site-nav > div { gap: 16px !important; }
      [style*="padding: 0 60px"] { padding-left: 22px !important; padding-right: 22px !important; }
      main { padding-left: 22px !important; padding-right: 22px !important; }
      main > div[style*="gap: 80px"] { flex-direction: column !important; gap: 24px !important; }
      main > div[style*="gap: 80px"] > div { flex: 1 1 auto !important; width: 100% !important; }
      h1 { font-size: 40px !important; line-height: 1.06 !important; }
    }
  </style>
</helmet>

<!-- NAV -->
<div id="site-nav" style="position: sticky; top: 0; background: var(--bg); z-index: 100; border-bottom: 1px solid transparent; transition: border-color 0.3s;">
  <div style="max-width: 1200px; margin: 0 auto; padding: 0 60px; display: flex; gap: 28px; align-items: center; height: 56px; font-family: 'Raleway', sans-serif;">
    <a href="index.html" style="font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text); text-decoration: none; border-bottom: 1.5px solid var(--text); padding-bottom: 2px;">Home</a>
    <a href="projects.html" style="font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); text-decoration: none;">Projects</a>
    <a href="about.html" style="font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); text-decoration: none;">About</a>
    <button id="theme-toggle" aria-label="Toggle dark mode" style="margin-left: auto; background: none; border: none; padding: 6px 0; display: inline-flex; align-items: center; cursor: none; font-family: 'Raleway', sans-serif;">
      <span id="theme-label" style="font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); transition: color 0.15s;" style-hover="color: var(--accent);">Dark</span>
    </button>
  </div>
</div>

<!-- HERO -->
<div style="min-height: calc(100vh - 56px); display: flex; align-items: center; font-family: 'Raleway', sans-serif;">
  <div style="max-width: 1200px; margin: 0 auto; padding: 0 60px; width: 100%;">
    <div style="max-width: 580px;">
      <div style="font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px;">Design Engineer · Creative Technologist</div>
      <h1 style="font-size: 76px; font-weight: 200; color: var(--text); line-height: 1.02; margin: 0 0 22px; letter-spacing: -0.03em;">Ori Blich</h1>
      <p style="font-size: 15px; font-weight: 300; color: var(--body); line-height: 1.9; margin: 0 0 6px; max-width: 400px; font-family: 'Merriweather', serif;">
        Specializing in human–machine interactions.<br>Currently: sustainable materials + VR tools.
      </p>
      <a href="mailto:oriblich@gmail.com" style="font-size: 11px; color: var(--muted); letter-spacing: 0.08em; display: inline-block; margin-bottom: 44px; text-decoration: none; font-family: 'Raleway', sans-serif;">oriblich@gmail.com</a>

      <!-- Button row -->
      <div style="display: flex; align-items: center; gap: 16px;">
        <button onClick="{{ handleWitty }}" style="width: 44px; height: 44px; background: var(--accent); border: none; border-radius: 50%; flex-shrink: 0; transition: filter 0.2s;" style-hover="filter: brightness(0.88);"></button>
        <span style="font-size: 11px; color: var(--muted); letter-spacing: 0.09em; font-family: 'Raleway', sans-serif;">↺  a thought</span>
      </div>

      <!-- Witty text appears after click -->
      <sc-if value="{{ showWitty }}" hint-placeholder-val="{{ false }}">
        <p style="margin-top: 26px; font-size: 14px; font-weight: 300; color: var(--body); line-height: 1.95; max-width: 480px; font-style: italic; font-family: 'Merriweather', serif; min-height: 26px;">{{ wittyText }}<sc-if value="{{ typing }}" hint-placeholder-val="{{ false }}"><span style="animation: blink 0.75s step-end infinite;">|</span></sc-if></p>
      </sc-if>
    </div>
  </div>
</div>

<!-- CURSOR -->
<div id="cursor-dot" style="position: fixed; left: -100px; top: -100px; width: 28px; height: 28px; border-radius: 50%; background: var(--cursor); pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: background 0.15s ease;"></div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { wittyText: '', showWitty: false, typing: false, lastIdx: -1 };

  _msgs = [
    "Under construction. Always. That's kind of the whole point.",
    "Technically, every website is under construction. This one is just honest about it.",
    "The cobbler's children have no shoes. The designer's portfolio is perpetually behind.",
    "404: completed portfolio not found. Check back after the next serendipitous discovery.",
    "I'm either building something interesting or staring at a blank canvas. Currently: both.",
    "My portfolio ages like a research project: indefinitely, with occasional breakthroughs.",
    "Still here. Still making things. Still not satisfied with this page.",
    "Plot twist: the under-construction page IS the portfolio.",
    "Good work takes time. Great work takes longer. This page is evidence of both.",
    "oriblich.com: where the shoemaker's children have no shoes since 2020.",
  ];

  componentDidMount() {
    const cursor = document.getElementById('cursor-dot');
    if (cursor) {
      this._onMove = (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const hot = el && (el.tagName === 'A' || el.tagName === 'BUTTON' || el.closest('a') || el.closest('button'));
        cursor.style.background = hot ? 'var(--accent-cursor)' : 'var(--cursor)';
      };
      window.addEventListener('mousemove', this._onMove);
    }
    this._onScroll = () => {
      const nav = document.getElementById('site-nav');
      if (nav) nav.style.borderColor = window.scrollY > 10 ? 'var(--border)' : 'transparent';
    };
    window.addEventListener('scroll', this._onScroll);
  }

  componentWillUnmount() {
    window.removeEventListener('mousemove', this._onMove);
    window.removeEventListener('scroll', this._onScroll);
    clearTimeout(this._tt);
  }

  _type(text, i) {
    if (i >= text.length) { this.setState({ typing: false }); return; }
    this.setState(s => ({ wittyText: s.wittyText + text[i] }));
    this._tt = setTimeout(() => this._type(text, i + 1), 38);
  }

  renderVals() {
    return {
      handleWitty: () => {
        if (this.state.typing) return;
        let idx;
        do { idx = Math.floor(Math.random() * this._msgs.length); } while (idx === this.state.lastIdx);
        clearTimeout(this._tt);
        this.setState({ showWitty: true, wittyText: '', typing: true, lastIdx: idx });
        this._type(this._msgs[idx], 0);
      },
      wittyText: this.state.wittyText,
      showWitty: this.state.showWitty,
      typing: this.state.typing,
    };
  }
}
</script>
</body>
</html>
