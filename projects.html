<meta charset="utf-8">

<x-dc>
<helmet>

  <script src="./theme.js"></script>
  <style>
    :root {
      --bg: #fafafa;
      --text: #1a1a1a;
      --body: #555;
      --sub: #888;
      --muted: #bbb;
      --wip: #ddd;
      --wip2: #e0e0e0;
      --border: #ebebeb;
      --hairline: #f5f5f5;
      --accent: #f97316;
      --accent-soft: rgba(249,115,22,0.3);
      --accent-cursor: rgba(249,115,22,0.65);
      --cursor: rgba(0,0,0,0.48);
    }
    [data-theme="dark"] {
      --bg: #141312;
      --text: #ececea;
      --body: #a6a39e;
      --sub: #97948f;
      --muted: #6e6b67;
      --wip: #46443f;
      --wip2: #39372f;
      --border: #2b2926;
      --hairline: #1e1c1a;
      --accent: #4ade80;
      --accent-soft: rgba(74,222,128,0.38);
      --accent-cursor: rgba(74,222,128,0.7);
      --cursor: rgba(255,255,255,0.55);
    }
    body { transition: background-color 0.3s ease; }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); cursor: none; }
    a { cursor: none; text-decoration: none; color: inherit; }
    button { cursor: none; }
    @media (max-width: 760px) {
      #site-nav > div { gap: 16px !important; }
      [style*="padding: 0 60px"] { padding-left: 22px !important; padding-right: 22px !important; }
      main { padding-left: 22px !important; padding-right: 22px !important; }
      main > div[style*="gap: 80px"] { flex-direction: column !important; gap: 24px !important; }
      main > div[style*="gap: 80px"] > div { flex: 1 1 auto !important; width: 100% !important; }
      h1 { font-size: 40px !important; line-height: 1.06 !important; }
    }
  </style>
</helmet>

    <a href="index.html" style="font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);">Home</a>

    <a href="about.html" style="font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);">About</a>
    <button id="theme-toggle" aria-label="Toggle dark mode" style="margin-left: auto; background: none; border: none; padding: 6px 0; display: inline-flex; align-items: center; cursor: none; font-family: 'Raleway', sans-serif;">
      <span id="theme-label" style="font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); transition: color 0.15s;" style-hover="color: var(--accent);">Dark</span>
    </button>
  </div>
</div>

<!-- Image overlay: small box that trails the cursor (set via JS), never centered over the list -->
<div id="proj-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; opacity: 0; transition: opacity 0.18s ease;">
  <div id="proj-overlay-box" style="position: absolute; left: 0; top: 0; width: 500px; height: 410px; will-change: transform;">
    <img class="proj-overlay-layer" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.18s ease;" alt=""/>
    <img class="proj-overlay-layer" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.18s ease;" alt=""/>
  </div>
</div>

<!-- CURSOR -->
<div id="cursor-dot" style="position: fixed; left: -100px; top: -100px; width: 28px; height: 28px; border-radius: 50%; background: var(--cursor); pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: background 0.15s ease;"></div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    const cursor = document.getElementById('cursor-dot');
    this._mx = window.innerWidth / 2;
    this._my = window.innerHeight / 2;
    const overlay = document.getElementById('proj-overlay');
    const box = document.getElementById('proj-overlay-box');
    const placeBox = () => {
      if (!box) return;
      const bw = box.offsetWidth, bh = box.offsetHeight;
      let x = this._mx + 32;                 // sit to the right of the pointer (the names are to its left)
      if (x + bw > window.innerWidth - 16) x = this._mx - bw - 32; // flip left only when it would clip the edge
      if (x < 16) x = 16;
      let y = this._my - bh / 2;             // vertically centered on the pointer
      y = Math.max(16, Math.min(y, window.innerHeight - bh - 16));
      box.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
    };
    if (cursor) {
      this._onMove = (e) => {
        this._mx = e.clientX; this._my = e.clientY;
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const hot = el && (el.tagName === 'A' || el.tagName === 'BUTTON' || el.closest('a') || el.closest('button'));
        cursor.style.background = hot ? 'var(--accent-cursor)' : 'var(--cursor)';
        if (overlay && overlay.style.opacity === '1') placeBox();
      };
      window.addEventListener('mousemove', this._onMove);
    }

    const layers = overlay ? overlay.querySelectorAll('.proj-overlay-layer') : [];
    // Only run the hover preview on devices that actually hover (skip phones/tablets,
    // where there's no pointer and a tap would just flash the image over the list).
    const canHover = !window.matchMedia || window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    if (canHover && overlay && box && layers.length === 2) {
      let front = 0; // index of the currently-shown layer
      this._cache = {};
      document.querySelectorAll('[data-proj-img]').forEach(row => {
        const src = row.getAttribute('data-proj-img');
        // Eagerly preload + decode lightweight stills; skip heavy animated GIFs (load on hover).
        if (src && !this._cache[src] && !/\.gif($|\?)/i.test(src)) {
          const img = new Image();
          img.src = src;
          this._cache[src] = img;
          if (img.decode) img.decode().catch(() => {});
        }
        row.addEventListener('mouseenter', () => {
          if (!src) return;
          const next = 1 - front;
          const show = layers[next], hide = layers[front];
          const reveal = () => { show.style.opacity = '1'; hide.style.opacity = '0'; front = next; };
          if (show.getAttribute('src') !== src) show.src = src;
          // Stills are preloaded+decoded; reveal immediately and let the CSS opacity transition fade it in.
          reveal();
          placeBox();
          overlay.style.opacity = '1';
        });
        row.addEventListener('mouseleave', () => { overlay.style.opacity = '0'; });
      });
    }

    this._onScroll = () => {
      const nav = document.getElementById('site-nav');
      if (nav) nav.style.borderColor = window.scrollY > 10 ? 'var(--border)' : 'transparent';
    };
    window.addEventListener('scroll', this._onScroll);
  }

  componentWillUnmount() {
    window.removeEventListener('mousemove', this._onMove);
    window.removeEventListener('scroll', this._onScroll);
  }

  renderVals() { return {}; }
}
</script>
</body>
</html>
